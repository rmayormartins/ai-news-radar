<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI RADAR // monitor de inteligencia artificial</title>
<meta name="description" content="Radar de noticias de IA: modelos, pesquisa e o que os laboratorios andam fazendo, com aba dedicada a IA na China. Sinal sobre ruido.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#080b11;
    --panel:#0f141d;
    --panel-2:#141b26;
    --panel-3:#1a2332;
    --line:#1e2836;
    --line-soft:#26303f;
    --text:#dbe4f0;
    --text-2:#9fb0c4;
    --muted:#647689;
    --accent:#2fe6c5;      /* sinal / radar */
    --accent-dim:#123c39;
    --china:#ff5a52;       /* sinal China */
    --china-dim:#3a1916;
    --japan:#ff7ec8;       /* sinal Japao (sakura) */
    --japan-dim:#371830;
    --model:#f5a524;       /* categoria modelo */
    --research:#8a8fff;    /* categoria pesquisa */
    --general:#6b8096;     /* categoria geral */
    --radius:3px;
    --maxw:1320px;
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{
    margin:0;background:var(--bg);color:var(--text);
    font-family:"Chakra Petch",system-ui,sans-serif;
    font-size:15px;line-height:1.5;
    -webkit-font-smoothing:antialiased;
    background-image:
      radial-gradient(circle at 12% -10%, rgba(47,230,197,.06), transparent 40%),
      radial-gradient(circle at 90% 0%, rgba(138,143,255,.05), transparent 45%);
    background-attachment:fixed;
  }
  a{color:inherit;text-decoration:none}
  ::selection{background:var(--accent);color:#04110f}

  .wrap{max-width:var(--maxw);margin:0 auto;padding:0 20px}

  /* ---------- HEADER ---------- */
  header{
    border-bottom:1px solid var(--line);
    background:linear-gradient(180deg, rgba(15,20,29,.9), rgba(8,11,17,.6));
    position:sticky;top:0;z-index:50;backdrop-filter:blur(8px);
  }
  .hd{display:flex;align-items:center;gap:18px;padding:14px 20px;max-width:var(--maxw);margin:0 auto;flex-wrap:wrap}
  .sweep{
    width:46px;height:46px;border-radius:50%;flex:0 0 auto;position:relative;
    border:1px solid var(--line-soft);background:#0a0f16;overflow:hidden;
  }
  .sweep::before{
    content:"";position:absolute;inset:0;border-radius:50%;
    background:conic-gradient(from 0deg, rgba(47,230,197,.55), transparent 28%);
    animation:spin 3.6s linear infinite;
  }
  .sweep::after{
    content:"";position:absolute;inset:7px;border-radius:50%;
    border:1px solid var(--line-soft);
    background:
      radial-gradient(circle, var(--accent) 0 1.4px, transparent 1.6px) 50% 50%/100% 100% no-repeat,
      radial-gradient(circle at 68% 36%, var(--accent) 0 1px, transparent 1.4px),
      radial-gradient(circle at 34% 64%, var(--china) 0 1px, transparent 1.4px);
  }
  @keyframes spin{to{transform:rotate(360deg)}}
  .brand{display:flex;flex-direction:column;line-height:1}
  .brand h1{
    margin:0;font-size:26px;font-weight:700;letter-spacing:3px;
    font-family:"Chakra Petch";
  }
  .brand h1 b{color:var(--accent);font-weight:700}
  .brand .tag{
    font-family:"JetBrains Mono";font-size:10.5px;letter-spacing:1.5px;
    color:var(--muted);margin-top:4px;text-transform:uppercase;
  }
  .hd-status{margin-left:auto;display:flex;align-items:center;gap:20px;flex-wrap:wrap}
  .stat{display:flex;flex-direction:column;align-items:flex-end;line-height:1.1}
  .stat .n{font-family:"JetBrains Mono";font-size:18px;font-weight:700;color:var(--text)}
  .stat .n.cn{color:var(--china)}
  .stat .n.jp{color:var(--japan)}
  .stat .l{font-family:"JetBrains Mono";font-size:9px;letter-spacing:1px;color:var(--muted);text-transform:uppercase;margin-top:3px}
  .live{display:flex;align-items:center;gap:7px;font-family:"JetBrains Mono";font-size:10px;color:var(--text-2);letter-spacing:.5px}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent);animation:pulse 2s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}

  /* ---------- STALE BANNER ---------- */
  .banner{display:none;background:var(--panel-2);border-bottom:1px solid var(--line);
    font-family:"JetBrains Mono";font-size:12px;color:var(--text-2)}
  .banner.show{display:block}
  .banner .wrap{padding:9px 20px;display:flex;gap:10px;align-items:center}
  .banner b{color:var(--model)}

  /* ---------- LAYOUT ---------- */
  .grid{display:grid;grid-template-columns:236px 1fr;gap:26px;padding:26px 20px;max-width:var(--maxw);margin:0 auto;align-items:start}
  aside{position:sticky;top:84px;display:flex;flex-direction:column;gap:22px;
    max-height:calc(100vh - 104px);overflow-y:auto;padding-right:6px;
    scrollbar-width:thin;scrollbar-color:var(--line-soft) transparent}
  aside::-webkit-scrollbar{width:8px}
  aside::-webkit-scrollbar-track{background:transparent}
  aside::-webkit-scrollbar-thumb{background:var(--line-soft);border-radius:8px;border:2px solid var(--bg)}
  aside::-webkit-scrollbar-thumb:hover{background:#33414f}
  /* a lista de fontes (longa) tambem ganha rolagem propria */
  #sources{max-height:300px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--line-soft) transparent}
  #sources::-webkit-scrollbar{width:6px}
  #sources::-webkit-scrollbar-thumb{background:var(--line-soft);border-radius:6px}

  .panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius)}
  .panel h2{
    margin:0;padding:11px 14px;font-size:10.5px;letter-spacing:1.6px;text-transform:uppercase;
    font-family:"JetBrains Mono";color:var(--muted);border-bottom:1px solid var(--line);font-weight:500;
    display:flex;justify-content:space-between;align-items:center;
  }
  .panel .body{padding:10px 12px;display:flex;flex-direction:column;gap:3px}

  /* tabs / filtros verticais */
  .navbtn{
    display:flex;align-items:center;gap:10px;width:100%;text-align:left;cursor:pointer;
    background:transparent;border:1px solid transparent;border-radius:var(--radius);
    color:var(--text-2);font-family:"Chakra Petch";font-size:13.5px;font-weight:500;
    padding:8px 10px;letter-spacing:.4px;transition:all .14s;
  }
  .navbtn:hover{background:var(--panel-2);color:var(--text)}
  .navbtn.active{background:var(--panel-3);color:var(--text);border-color:var(--line-soft)}
  .navbtn .ico{width:8px;height:8px;border-radius:50%;flex:0 0 auto;background:var(--muted)}
  .navbtn[data-view="todas"] .ico{background:var(--accent)}
  .navbtn[data-view="modelo"] .ico{background:var(--model)}
  .navbtn[data-view="pesquisa"] .ico{background:var(--research)}
  .navbtn[data-view="china"] .ico{background:var(--china)}
  .navbtn[data-view="japan"] .ico{background:var(--japan)}
  .navbtn .cnt{margin-left:auto;font-family:"JetBrains Mono";font-size:11px;color:var(--muted)}
  .navbtn.active .cnt{color:var(--text-2)}
  .navbtn[data-view="china"].active{border-color:#5a2420}
  .navbtn[data-view="japan"].active{border-color:#5a2450}

  .srcrow{display:flex;align-items:center;gap:8px;padding:5px 6px;cursor:pointer;border-radius:var(--radius);font-family:"JetBrains Mono";font-size:11.5px;color:var(--text-2)}
  .srcrow:hover{background:var(--panel-2)}
  .srcrow input{accent-color:var(--accent);margin:0;width:13px;height:13px;flex:0 0 auto}
  .srcrow .sn{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .srcrow .sc{margin-left:auto;color:var(--muted)}
  .srcrow.cn .sn{color:#ffb0ab}
  .srcrow.jp .sn{color:#ffb3e0}

  .legend{font-family:"JetBrains Mono";font-size:10.5px;color:var(--muted);line-height:1.8}
  .legend .row{display:flex;align-items:center;gap:8px}
  .legend .sw{width:10px;height:10px;border-radius:2px;flex:0 0 auto}

  /* ---------- BYLINE (assinatura) ---------- */
  .byline{border-bottom:1px solid var(--line);background:linear-gradient(180deg, rgba(15,20,29,.6), transparent)}
  .byline .in{max-width:var(--maxw);margin:0 auto;padding:8px 20px;display:flex;align-items:center;gap:8px 13px;flex-wrap:wrap;
    font-family:"JetBrains Mono";font-size:11px;color:var(--muted);letter-spacing:.3px}
  .byline a{color:var(--text-2);transition:color .14s;display:inline-flex;align-items:center;gap:5px}
  .byline a:hover{color:var(--accent)}
  .byline .gh:hover{color:var(--accent)}
  .byline .sep{color:var(--line-soft)}
  .byline .dash{color:var(--muted)}
  .byline svg{width:13px;height:13px;fill:currentColor}

  /* ---------- TOOLBAR ---------- */
  .toolbar{display:flex;gap:12px;align-items:center;margin-bottom:18px;flex-wrap:wrap}
  .search{flex:1;min-width:200px;position:relative}
  .search input{
    width:100%;background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
    color:var(--text);font-family:"JetBrains Mono";font-size:13px;padding:10px 12px 10px 34px;
  }
  .search input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-dim)}
  .search input::placeholder{color:var(--muted)}
  .search svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);width:14px;height:14px;stroke:var(--muted)}
  .sortbtn{
    background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
    color:var(--text-2);font-family:"JetBrains Mono";font-size:11px;letter-spacing:.5px;
    padding:10px 13px;cursor:pointer;display:flex;align-items:center;gap:7px;text-transform:uppercase;
  }
  .sortbtn:hover{border-color:var(--line-soft);color:var(--text)}
  .sortbtn b{color:var(--accent)}
  .rangesel{position:relative}
  .rangesel select{
    appearance:none;-webkit-appearance:none;cursor:pointer;
    background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
    color:var(--text-2);font-family:"JetBrains Mono";font-size:11px;letter-spacing:.5px;
    padding:10px 30px 10px 13px;text-transform:uppercase;
  }
  .rangesel select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-dim);color:var(--text)}
  .rangesel::after{content:"";position:absolute;right:12px;top:50%;width:6px;height:6px;border-right:1.5px solid var(--muted);border-bottom:1.5px solid var(--muted);transform:translateY(-65%) rotate(45deg);pointer-events:none}

  .morebar{display:flex;flex-direction:column;align-items:center;gap:10px;padding:18px 0 6px}
  .showing{font-family:"JetBrains Mono";font-size:10.5px;letter-spacing:.5px;color:var(--muted)}
  .morebtn{
    background:var(--panel);border:1px solid var(--line-soft);border-radius:var(--radius);
    color:var(--accent);font-family:"JetBrains Mono";font-size:12px;letter-spacing:1px;
    padding:11px 26px;cursor:pointer;text-transform:uppercase;transition:all .14s;
  }
  .morebtn:hover{background:var(--panel-2);box-shadow:0 0 0 2px var(--accent-dim)}

  /* chave (switch) ocultar pesquisa */
  .switchwrap{display:flex;flex-direction:column;gap:4px;padding:8px 12px;border-bottom:1px solid var(--line)}
  .switch{display:flex;align-items:center;gap:9px;cursor:pointer;font-family:"JetBrains Mono";font-size:11px;color:var(--text-2);user-select:none;padding:3px 2px;border-radius:var(--radius)}
  .switch:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
  .switch .track{width:30px;height:16px;border-radius:9px;background:var(--panel-3);border:1px solid var(--line-soft);position:relative;transition:.15s;flex:0 0 auto}
  .switch .knob{position:absolute;top:1px;left:1px;width:12px;height:12px;border-radius:50%;background:var(--muted);transition:.15s}
  .switch.on{color:var(--text)}
  .switch.on .track{background:var(--accent-dim);border-color:var(--accent)}
  .switch.on .knob{left:15px;background:var(--accent)}
  .switch.cn.on .track{background:var(--china-dim);border-color:var(--china)}
  .switch.cn.on .knob{background:var(--china)}
  .switch.jp.on .track{background:var(--japan-dim);border-color:var(--japan)}
  .switch.jp.on .knob{background:var(--japan)}

  /* botao traduzir */
  .trbtn[aria-pressed="true"]{border-color:var(--accent);color:var(--text)}
  .trbtn[aria-pressed="true"] b{color:var(--accent)}
  .trbtn.busy{opacity:.65;cursor:progress}
  .trbtn.busy b::after{content:"...";}

  /* ---------- FEED ---------- */
  .feed{display:flex;flex-direction:column;gap:12px}
  .card{
    background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
    padding:15px 17px;display:grid;grid-template-columns:1fr auto;gap:6px 16px;
    transition:border-color .15s, transform .15s;position:relative;overflow:hidden;
  }
  .card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--general);opacity:.7}
  .card.c-modelo::before{background:var(--model)}
  .card.c-pesquisa::before{background:var(--research)}
  .card.c-china::before{background:var(--china)}
  .card.c-japan::before{background:var(--japan)}
  .card:hover{border-color:var(--line-soft);transform:translateX(2px)}
  .card .meta{grid-column:1/2;display:flex;align-items:center;gap:9px;flex-wrap:wrap;font-family:"JetBrains Mono";font-size:10.5px}
  .chip{padding:2px 7px;border-radius:2px;letter-spacing:.6px;text-transform:uppercase;font-weight:500;border:1px solid var(--line-soft)}
  .chip.modelo{color:var(--model);border-color:#4a3a16}
  .chip.pesquisa{color:var(--research);border-color:#33356a}
  .chip.geral{color:var(--general);border-color:#34414f}
  .chip.china{color:var(--china);border-color:#5a2420;background:var(--china-dim)}
  .chip.japan{color:var(--japan);border-color:#5a2450;background:var(--japan-dim)}
  .src{color:var(--text-2)}
  .when{color:var(--muted);margin-left:auto}
  .card h3{grid-column:1/2;margin:2px 0 0;font-size:16.5px;font-weight:600;line-height:1.32;letter-spacing:.2px}
  .card h3 a:hover{color:var(--accent)}
  .card p{grid-column:1/2;margin:4px 0 0;color:var(--text-2);font-size:13.5px;line-height:1.5;font-family:"Chakra Petch"}
  .card .open{grid-column:1/2;margin-top:9px;font-family:"JetBrains Mono";font-size:10.5px;color:var(--muted);letter-spacing:.5px;display:inline-flex;align-items:center;gap:6px}
  .card:hover .open{color:var(--accent)}

  /* medidor de sinal (SNR) - a assinatura */
  .snr{grid-row:1/3;grid-column:2/3;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;gap:6px;padding-top:1px}
  .snr .bars{display:flex;align-items:flex-end;gap:2px;height:30px}
  .snr .bar{width:4px;background:var(--line-soft);border-radius:1px}
  .snr .bar.on{background:var(--accent)}
  .snr.cn .bar.on{background:var(--china)}
  .snr.jp .bar.on{background:var(--japan)}
  .snr .val{font-family:"JetBrains Mono";font-size:11px;font-weight:700;color:var(--text-2)}
  .snr .lbl{font-family:"JetBrains Mono";font-size:8px;letter-spacing:1px;color:var(--muted);text-transform:uppercase}

  /* ---------- ESTADOS ---------- */
  .empty,.loading{
    border:1px dashed var(--line-soft);border-radius:var(--radius);padding:46px 24px;text-align:center;
    font-family:"JetBrains Mono";color:var(--muted);font-size:13px;line-height:1.7;
  }
  .empty b{color:var(--text-2);display:block;font-size:15px;margin-bottom:8px;font-family:"Chakra Petch";letter-spacing:1px}
  .empty code{background:var(--panel-2);border:1px solid var(--line);padding:2px 6px;border-radius:2px;color:var(--accent);font-size:12px}
  .loading .sweep{margin:0 auto 16px}

  footer{border-top:1px solid var(--line);margin-top:40px}
  .ft{max-width:var(--maxw);margin:0 auto;padding:20px;display:flex;justify-content:space-between;gap:14px;flex-wrap:wrap;
    font-family:"JetBrains Mono";font-size:10.5px;color:var(--muted);letter-spacing:.5px}
  .ft a:hover{color:var(--accent)}
  .ft .serif{font-family:"Instrument Serif";font-style:italic;font-size:15px;color:var(--text-2);letter-spacing:0}

  @media (max-width:860px){
    .grid{grid-template-columns:1fr;gap:18px}
    aside{position:static;flex-direction:column}
    .panel.sources-panel{display:none}          /* legenda fica oculta no mobile */
    .fontes-panel #sources{display:none}        /* lista de fontes oculta no mobile */
    .fontes-panel #src-toggle{display:none}     /* botao "limpar" idem */
    .fontes-panel h2{border-bottom:none}
    .card{grid-template-columns:1fr}
    .snr{grid-row:auto;grid-column:1/2;flex-direction:row;justify-content:flex-start;margin-top:8px;gap:8px}
    .snr .bars{height:18px}
    .brand h1{font-size:22px}
  }
  @media (prefers-reduced-motion:reduce){
    *{animation:none!important;scroll-behavior:auto!important;transition:none!important}
  }
</style>
</head>
<body>

<header>
  <div class="hd">
    <div class="sweep" aria-hidden="true"></div>
    <div class="brand">
      <h1>AI&nbsp;<b>RADAR</b></h1>
      <span class="tag">monitor de IA // sinal sobre ruido</span>
    </div>
    <div class="hd-status">
      <div class="live"><span class="dot"></span><span id="updated">sincronizando...</span></div>
      <div class="stat"><span class="n" id="stat-total">0</span><span class="l">sinais</span></div>
      <div class="stat"><span class="n cn" id="stat-china">0</span><span class="l">china</span></div>
      <div class="stat"><span class="n jp" id="stat-japan">0</span><span class="l">japao</span></div>
    </div>
  </div>
</header>

<div class="byline">
  <div class="in">
    <span>Author <a href="https://rmayormartins.github.io" target="_blank" rel="noopener">Ramon Mayor Martins, Ph.D.</a></span>
    <span class="sep">//</span>
    <a class="gh" href="https://github.com/rmayormartins" target="_blank" rel="noopener" aria-label="GitHub @rmayormartins"><svg viewBox="0 0 16 16" aria-hidden="true"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>@rmayormartins</a>
    <span class="sep">//</span>
    <span><a href="https://www.ifsc.edu.br/web/campus-sao-jose" target="_blank" rel="noopener">IFSC SJ</a> <span class="dash">-</span> <a href="https://wiki.sj.ifsc.edu.br/index.php/P%C3%A1gina_principal" target="_blank" rel="noopener">Area de Telecomunicacoes</a></span>
  </div>
</div>

<div class="banner" id="banner">
  <div class="wrap"><span>&#9888;</span><span id="banner-txt"></span></div>
</div>

<div class="grid">
  <aside>
    <div class="panel">
      <h2>Faixas</h2>
      <div class="body" id="views">
        <button class="navbtn active" data-view="todas"><span class="ico"></span>Todas<span class="cnt" data-cnt="todas">0</span></button>
        <button class="navbtn" data-view="modelo"><span class="ico"></span>Modelos<span class="cnt" data-cnt="modelo">0</span></button>
        <button class="navbtn" data-view="pesquisa"><span class="ico"></span>Pesquisa<span class="cnt" data-cnt="pesquisa">0</span></button>
        <button class="navbtn" data-view="china"><span class="ico"></span>IA na China<span class="cnt" data-cnt="china">0</span></button>
        <button class="navbtn" data-view="japan"><span class="ico"></span>IA no Japao<span class="cnt" data-cnt="japan">0</span></button>
      </div>
    </div>

    <div class="panel fontes-panel">
      <h2>Fontes <button id="src-toggle" style="background:none;border:none;color:var(--muted);font-family:inherit;font-size:9px;cursor:pointer;letter-spacing:1px">limpar</button></h2>
      <div class="switchwrap">
        <div class="switch" id="hide-research" role="switch" aria-checked="false" tabindex="0">
          <span class="track"><span class="knob"></span></span>
          <span>ocultar pesquisa (arXiv, papers)</span>
